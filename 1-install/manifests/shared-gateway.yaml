# ------------------------------------------------------------------------------
# Shared Gateway + platform defaults
#
# This file defines the platform-wide "shared" Gateway that most applications
# attach their HTTPRoutes to. It listens on:
#   - port 80  (HTTP)  -> redirected to HTTPS
#   - port 443 (HTTPS) -> terminates TLS for a wildcard domain
#
# Replace the placeholders below for your environment:
#   *.example.com                -> your wildcard domain
#   shared-tls-secret            -> the TLS secret holding the wildcard cert
#
# Applications do NOT need their own redirect route; the http-to-https-redirect
# route below handles it for every app on the shared gateway.
# ------------------------------------------------------------------------------
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: main-gateway
  namespace: envoy-gateway-system
  # Add cloud-provider Load Balancer annotations here if needed, e.g.:
  # annotations:
  #   service.beta.kubernetes.io/aws-load-balancer-internal: "true"
spec:
  gatewayClassName: envoy-gateway-class
  listeners:
    # HTTP listener - only used to redirect to HTTPS.
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All

    # HTTPS listener - shared wildcard TLS termination.
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "*.example.com"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: shared-tls-secret
            namespace: envoy-gateway-system
      allowedRoutes:
        namespaces:
          from: All
---
# ------------------------------------------------------------------------------
# Global HTTP -> HTTPS redirect
# One route in the gateway namespace catches all HTTP (port 80) traffic and
# issues a permanent redirect to HTTPS. Individual apps do not need their own.
# ------------------------------------------------------------------------------
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-to-https-redirect
  namespace: envoy-gateway-system
spec:
  parentRefs:
    - name: main-gateway
      namespace: envoy-gateway-system
      sectionName: http
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
---
# ------------------------------------------------------------------------------
# Gateway-level default BackendTrafficPolicy
# Sets a sane default request timeout for ALL routes on the shared gateway.
# Per-app BackendTrafficPolicies (from the Helm chart) override these defaults.
#
# Why: Envoy's default route timeout (15s) is stricter than NGINX's default
# (60s). Setting 60s here avoids surprise timeouts when migrating from NGINX.
# ------------------------------------------------------------------------------
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: gateway-default-timeouts
  namespace: envoy-gateway-system
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: main-gateway
  timeout:
    http:
      requestTimeout: 60s
