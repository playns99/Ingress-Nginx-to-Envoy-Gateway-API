{{- /*
HTTPRoute - routes traffic from a Gateway listener to backend Services.

Attaches to:
  - the shared platform gateway (gatewayAPI.gatewayName / gatewayNamespace), and/or
  - a per-app custom-domain Gateway (rendered by gateway.yaml) when
    gatewayAPI.customHostnames is set.

Guardrail: on a shared wildcard gateway a route with NO hostnames becomes a
catch-all that hijacks every unmatched subdomain, so we require at least one
hostname.
*/ -}}
{{- $gw := .Values.gatewayAPI | default dict -}}
{{- if $gw.enabled | default false }}
{{- if not (or $gw.hostnames $gw.customHostnames) }}
{{- fail "gatewayAPI.enabled is true but neither gatewayAPI.hostnames nor gatewayAPI.customHostnames is set. Set at least one hostname to avoid a catch-all route on the shared wildcard gateway." }}
{{- end }}
{{- $appName := include "gateway-routes.appName" . -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "gateway-routes.routeName" . }}
  namespace: {{ include "gateway-routes.namespace" . }}
  labels:
    {{- include "gateway-routes.labels" . | nindent 4 }}
  {{- with $gw.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- if or $gw.hostnames (not $gw.customHostnames) }}
    - name: {{ default "main-gateway" $gw.gatewayName }}
      namespace: {{ default "envoy-gateway-system" $gw.gatewayNamespace }}
      {{- with $gw.sectionName }}
      sectionName: {{ . }}
      {{- end }}
    {{- end }}
    {{- if $gw.customHostnames }}
    - name: {{ include "gateway-routes.customGatewayName" . }}
      namespace: {{ include "gateway-routes.namespace" . }}
    {{- end }}
  {{- if or $gw.hostnames $gw.customHostnames }}
  hostnames:
    {{- range $gw.hostnames }}
    - {{ . | quote }}
    {{- end }}
    {{- range ($gw.customHostnames | default list) }}
    - {{ . | quote }}
    {{- end }}
  {{- end }}
  rules:
    {{- if $gw.rules }}
    {{- range $gw.rules }}
    - matches:
      {{- if .matches }}
{{ toYaml .matches | indent 8 }}
      {{- else }}
        - path:
            type: PathPrefix
            value: /
      {{- end }}
      {{- with .filters }}
      filters:
{{ toYaml . | indent 8 }}
      {{- end }}
      backendRefs:
      {{- if .backendRefs }}
{{ toYaml .backendRefs | indent 8 }}
      {{- else }}
        - group: ""
          kind: Service
          name: {{ $appName }}
          port: {{ $.Values.service.port | default 80 }}
          weight: 1
      {{- end }}
    {{- end }}
    {{- else }}
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: {{ default $appName $gw.serviceName }}
          port: {{ $gw.servicePort | default .Values.service.port | default 80 }}
          weight: 1
    {{- end }}
{{- end }}
